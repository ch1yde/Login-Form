<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link rel="preload" href="images/Facebook Logo.png" as="image">
    <link rel="icon" href="images/Facebook Logo.png">
    <link rel="stylesheet" href="css/style.css">
    <title>Login Form</title>
</head>

<body>
    <div class="forms">
        <img src="images/Facebook Logo.png">
        <h1>Login</h1>
        <form>
            <label for="username">Username</label>
            <input type="username" id="username" placeholder="Enter your username" class="loginForm">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" class="loginForm">
            <input type="submit" id="login" value="Login" class="submitButton">
            
            <div class="formPrompts">
                <p class="left">Don't have an account? <a href=""> Sign up</a></p>
                <a href="" class="right">forgot password</a>
            </div>

        </form>
    </div>
</body>
</html>

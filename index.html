<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link rel="preload" href="images/Facebook Logo.png" as="image">
    <link rel="icon" href="images/Facebook Logo.png">
    <link rel="stylesheet" href="css/style.css">
    <title>Login Form</title>
</head>

<body>
    <div class="forms">
        <img src="images/Facebook Logo.png">
        <h1>Login</h1>
        
        <input type="radio" id="toggleSignup" name="log" hidden>
        <input type=radio name="log" id="toggleLogin" hidden checked>

        
        <form id="frontdesk1" class="frontdesk">
            <label for="username" class="loginlabel">Username</label>
            <input type="username" id="username" placeholder="Enter your username" class="loginInputs" autocomplete="off" autofocus="on">
            <label for="password" class="loginlabel">Password</label>
            <input type="password" id="password" placeholder="Enter your password" class="loginInputs">
            <input type="submit" id="login" value="LOGIN" class="submitButton">
            
            <div class="formPrompts">
                <p class="left">Don't have an account? <label for="toggleSignup" class="logformat">Sign up</label></p>
                <div class="right">
                    <a href="">Forgot password</a>
                </div>
            </div>
        </form>

        <form id="frontdesk2" class="frontdesk">
            <label for="newusername" class="loginlabel">New username</label>
            <input type="username" id="newusername" placeholder="Enter your new username" class="loginInputs" autocomplete="off" autofocus="on">
            <label for="newpassword" class="loginlabel">Password</label>
            <input type="password" id="newpassword" placeholder="Enter your password" class="loginInputs">
            <label for="confirmpassword" class="loginlabel">Confirm password</label>
            <input type="password" id="confirmpassword" placeholder="Re-enter your password" class="loginInputs">
            <input type="submit" id="login" value="SIGNUP" class="submitButton">
            
            <div class="formPrompts">
                <p class="left">Don't have an account? <label for="toggleLogin" class="logformat">Sign in</label></p>
                
                <div class="right">
                    <a href="">Forgot password</a>
                </div>
                
            </div>
        </form>
    </div>
</body>
</html>

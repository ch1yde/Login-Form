<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link rel="icon" href="images/Facebook Logo.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <title>Login Form</title>
</head>
<body>
    
    <div class="frame__accountSetup">
        
        <input type="radio" id="toggleLogin" name="showContent" hidden checked>
        <input type="radio" id="toggleSignup" name="showContent" hidden>

        <div class="form__content" id="loginForm">
            <div class="form__titlePage">
                <img src="images/Facebook Logo.png">
                <h1>Welcome Back</h1>
            </div>
            
            <form class="form__accountSetup">
                <label for="username" class="labels">Username</label>
                <input type="username" class="inputs" id="username" placeholder="Enter your username" autofocus required>
                <label for="password" class="labels">Password</label>
                <input type="password" class="inputs" id="password" placeholder="Enter your password" required>
                <input type="submit" value="LOGIN" class="button">
            </form>

            <div class="form__options">
                <div class="left">
                    <p>Don't have an account? <label for="toggleSignup">Signup</label></p>
                </div>
                
                <div class="right">
                    <a href="">Forgot password</a>
                </div>
            </div>
        </div>

        <div class="form__content"  id="signupForm">
            <div class="form__titlePage">
                <img src="images/Facebook Logo.png" draggable="false">
                <h1>Create New Account</h1>
            </div>
            
            <form class="form__accountSetup">
                <label for="newusername" class="labels">Username</label>
                <input type="username" class="inputs" id="newusername" placeholder="Enter new username">
                <label for="newpassword" class="labels">Password</label>
                <input type="password" class="inputs" id="newpassword" placeholder="Enter new password">
                <label for="confirmPassword" class="labels">New Password</label>
                <input type="password" class="inputs" id="confirmPassword" placeholder="Re enter password">
                <input type="submit" value="SIGNUP" class="button">
            </form>
            
            <div class="form__options">
                <div class="left">
                    <p>Don't have an account? <label for="toggleLogin">Login</label></p>
                </div>
                
                <div class="right">
                    <a href="">Forgot password</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
